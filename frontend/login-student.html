<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الطالب | إتقان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#14213D; --ink-soft:#4B5A72; --ink-faint:#8A96A8; --gold:#C9973E; --gold-deep:#A97C2C; --gold-light:#FBF1DD;
    --sage:#3F6D5C; --sage-light:#E6F0EA; --danger:#B33F3F; --danger-light:#FBEAEA;
    --paper:#F7F5F0; --surface:#FFFFFF; --surface-2:#F1EEE6; --line:#E4E1D6; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  h1,h2,.brand span,.btn,.tab{font-family:'Cairo',sans-serif;}
  .wrap{width:100%;max-width:420px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:36px;box-shadow:0 20px 50px rgba(20,33,61,.1);}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px;}
  .brand .logo{height:44px;width:auto;object-fit:contain;display:block;}
  .role-badge{display:block;text-align:center;font-weight:700;font-size:12.5px;color:var(--sage);background:var(--sage-light);padding:6px 14px;border-radius:100px;width:fit-content;margin:0 auto 22px;}
  h1{font-size:21px;text-align:center;margin-bottom:6px;}
  p.sub{text-align:center;color:var(--ink-soft);font-size:13.5px;margin-bottom:24px;}
  .tabs{display:flex;gap:5px;background:var(--surface-2);padding:5px;border-radius:13px;margin-bottom:24px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(20,33,61,.06);}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;}
  .field input,.field select{width:100%;padding:12px 15px;border-radius:11px;border:1.5px solid var(--line);background:var(--paper);font-family:inherit;font-size:14.5px;outline:none;transition:border-color .2s;color:var(--ink);}
  .field input:focus,.field select:focus{border-color:var(--gold);}
  .btn-main{width:100%;font-weight:700;font-size:15px;padding:13px;border-radius:11px;border:none;cursor:pointer;
    background:linear-gradient(155deg,var(--gold),var(--gold-deep));color:#fff;transition:all .2s;margin-top:6px;box-shadow:0 8px 20px -8px rgba(201,151,62,.55);}
  .btn-main:hover{filter:brightness(1.05);transform:translateY(-1px);}
  .error{background:var(--danger-light);color:var(--danger);padding:11px 14px;border-radius:11px;font-size:13.5px;margin-bottom:16px;display:none;}
  .error.show{display:block;}
  .switch-links{margin-top:24px;display:flex;flex-direction:column;gap:9px;text-align:center;}
  .switch-links a{font-size:13px;color:var(--ink-soft);}
  .switch-links a:hover{color:var(--gold-deep);}
  .back-home{position:fixed;top:22px;right:26px;font-size:13.5px;color:var(--ink-soft);}
  .form-view{display:none;}
  .form-view.active{display:block;}
</style>
</head>
<body>
  <a class="back-home" href="index.html">← الرجوع للصفحة الرئيسية</a>
  <div class="wrap">
    <div class="card">
      <div class="brand"><img class="logo" src="etqan-logo.png" alt="إتقان"></div>
      <span class="role-badge">حساب الطالب</span>

      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="showForm('login')">تسجيل الدخول</button>
        <button class="tab" id="tabSignup" onclick="showForm('signup')">إنشاء حساب جديد</button>
      </div>

      <div class="error" id="errBox"></div>

      <!-- LOGIN FORM -->
      <div class="form-view active" id="formLogin">
        <h1>أهلاً بيك تاني 👋</h1>
        <p class="sub">اكتب رقم هاتفك اللي سجّلت بيه عشان تدخل حسابك</p>
        <form id="loginForm">
          <div class="field"><label>البريد الإلكتروني</label><input type="email" id="loginEmail" placeholder="you@example.com" required></div>
          <div class="field"><label>كلمة المرور</label><input type="password" id="loginPassword" placeholder="••••••••" required></div>
          <button class="btn-main" type="submit">دخول</button>
        </form>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-view" id="formSignup">
        <h1>ابدأ رحلتك مع إتقان 🚀</h1>
        <p class="sub">أنشئ حسابك الجديد في أقل من دقيقة</p>
        <form id="signupForm">
          <div class="field"><label>الاسم بالكامل</label><input type="text" id="suName" placeholder="اسمك بالكامل" required></div>
          <div class="field"><label>البريد الإلكتروني</label><input type="email" id="suEmail" placeholder="you@example.com" required></div>
          <div class="field"><label>كلمة المرور</label><input type="password" id="suPassword" placeholder="8 أحرف على الأقل" minlength="8" required></div>
          <div class="field"><label>رقم الهاتف</label><input type="tel" id="suPhone" placeholder="01xxxxxxxxx" required></div>
          <div class="field">
            <label>الصف الدراسي</label>
            <select id="suGrade" required>
              <option value="">اختر الصف الدراسي</option>
              <option>الأول الثانوي</option>
              <option>الثاني الثانوي</option>
              <option>الثالث الثانوي</option>
            </select>
          </div>
          <button class="btn-main" type="submit">إنشاء الحساب والدخول</button>
        </form>
      </div>

      <div class="switch-links">
        <a href="login-teacher.html">دخول المدرّسين</a>
        <a href="login-admin.html">دخول المدير العام</a>
      </div>
    </div>
  </div>

<script src="common.js"></script>
<script src="api.js"></script>
<script>
  const errBox = document.getElementById('errBox');
  function clearErr(){ errBox.classList.remove('show'); errBox.textContent=''; }
  function showErr(msg){ errBox.textContent = msg; errBox.classList.add('show'); }

  function showForm(which){
    clearErr();
    document.getElementById('tabLogin').classList.toggle('active', which==='login');
    document.getElementById('tabSignup').classList.toggle('active', which==='signup');
    document.getElementById('formLogin').classList.toggle('active', which==='login');
    document.getElementById('formSignup').classList.toggle('active', which==='signup');
  }

  // لو الطالب داخل بالفعل، ودّيه على لوحته على طول
  (async function(){
    try{
      const me = await EtqanAPI.me();
      if(me && me.ok && me.user && me.user.role==='student'){ window.location.href = 'student-dashboard.html'; }
    }catch(e){}
  })();

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    clearErr();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if(!email || !password){ showErr('من فضلك املأ كل الحقول'); return; }
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'جارِ الدخول...';
    const res = await EtqanAPI.login({ email, password });
    btn.disabled = false; btn.textContent = 'دخول';
    if(res.ok && res.user && res.user.role === 'student'){
      window.location.href = 'student-dashboard.html';
    } else if (res.ok) {
      showErr('هذا الحساب ليس حساب طالب.');
    } else {
      showErr((res.errors && res.errors[0]) || 'بيانات الدخول غير صحيحة');
    }
  });

  document.getElementById('signupForm').addEventListener('submit', async function(e){
    e.preventDefault();
    clearErr();
    const name = document.getElementById('suName').value.trim();
    const email = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;
    const phone = document.getElementById('suPhone').value.trim();
    const grade = document.getElementById('suGrade').value;
    if(!name || !email || !password || !phone || !grade){ showErr('من فضلك املأ كل الحقول'); return; }
    if(password.length < 8){ showErr('كلمة المرور لازم تكون 8 أحرف على الأقل'); return; }
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'جارِ الإنشاء...';
    const res = await EtqanAPI.signup({ name, email, password, role: 'student', phone, grade });
    btn.disabled = false; btn.textContent = 'إنشاء الحساب والدخول';
    if(res.ok){
      // API signup succeeded — redirect to dashboard
      window.location.href = 'student-dashboard.html';
    } else {
      showErr((res.errors && res.errors[0]) || 'تعذّر إنشاء الحساب');
    }
  });
</script>
</body>
</html>
